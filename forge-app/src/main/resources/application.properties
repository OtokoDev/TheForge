micronaut.application.name=forge

# ── Base de données ───────────────────────────────────────────────────────────
# url/username/password ne sont PAS ici volontairement.
#   - dev   → application-dev.properties (localhost, profil activé par défaut)
#   - test  → fournis par Micronaut Test Resources (container PostgreSQL)
#   - prod  → variables d'env DATASOURCES_DEFAULT_*
datasources.default.db-type=postgres
datasources.default.dialect=POSTGRES
datasources.default.driver-class-name=org.postgresql.Driver
# Pool de connexions JDBC (Hikari). Surchargeable par env DATASOURCES_DEFAULT_MAXIMUM_POOL_SIZE.
# Garder < max_connections de PostgreSQL (défaut 100).
datasources.default.maximum-pool-size=50
datasources.default.minimum-idle=10
# Hibernate pilote les transactions : pas d'autocommit par requête.
datasources.default.auto-commit=false
# Nom du pool (lisible dans les logs Hikari).
datasources.default.pool-name=forge-pool
jpa.default.properties.hibernate.hbm2ddl.auto=none
jpa.default.properties.hibernate.show_sql=false

# Sérialisation JSON : ne pas omettre les nulls -> on garde une forme stable
micronaut.serde.serialization.inclusion=non_null

# ── Flyway ────────────────────────────────────────────────────────────────────
flyway.datasources.default.enabled=true

# ── Sécurité ──────────────────────────────────────────────────────────────────
# Auth par cookie : le flux OAuth est redirect-based et le front est servi sur une
# autre origine ; le JWT est déposé dans un cookie puis renvoyé à chaque appel API.
micronaut.security.authentication=cookie
micronaut.security.token.jwt.signatures.secret.generator.secret=${JWT_GENERATOR_SIGNATURE_SECRET:pleaseChangeThisSecretForANewOne}
# Durée de vie de l'access token : 7 jours. Token long acceptable car le bannissement
# est rendu effectif immédiatement par ActiveCheckFilter (denylist par requête).
micronaut.security.token.generator.access-token.expiration=604800

# OAuth2 Discord (provider OAuth 2.0 non-OIDC -> DiscordAuthenticationMapper @Named("discord"))
micronaut.security.oauth2.clients.discord.client-id=${DISCORD_CLIENT_ID}
micronaut.security.oauth2.clients.discord.client-secret=${DISCORD_CLIENT_SECRET}
micronaut.security.oauth2.clients.discord.scopes=identify
micronaut.security.oauth2.clients.discord.authorization.url=https://discord.com/oauth2/authorize
micronaut.security.oauth2.clients.discord.token.url=https://discord.com/api/oauth2/token
micronaut.security.oauth2.clients.discord.token.auth-method=client-secret-post

# Redirections après login (succès / échec) vers le front Svelte (routing hash svelte-spa-router).
# Relatives par défaut (FRONT_ORIGIN vide) → restent sur l'origine courante (front + back même
# :8080). Le `#/...` cible une route SPA. Pour un front séparé en dev, définir FRONT_ORIGIN
# (ex. http://localhost:5173) → redirections absolues vers ce front.
micronaut.security.redirect.login-success=${FRONT_ORIGIN:}/#/dashboard
micronaut.security.redirect.login-failure=${FRONT_ORIGIN:}/

# Logout : autorisé en GET (lien <a> côté front), puis retour à l'accueil
micronaut.security.endpoints.logout.get-allowed=true
micronaut.security.redirect.logout=${FRONT_ORIGIN:}/

# Tout est anonyme par défaut ; chaque controller porte sa propre @Secured.
micronaut.security.intercept-url-map[0].pattern=/**
micronaut.security.intercept-url-map[0].access[0]=isAnonymous()

# ── CORS (front Next.js séparé) ───────────────────────────────────────────────
# Cookie => allow-credentials + origine explicite (pas de wildcard).
micronaut.server.cors.enabled=true
micronaut.server.cors.configurations.web.allowed-origins=${FRONT_ORIGIN:http://localhost:5173}
micronaut.server.cors.configurations.web.allow-credentials=true

# ── Front Next.js (export statique embarqué dans le jar) ──────────────────────
# Les contrôleurs (@Secured) ont priorité sur ce mapping ; le statique sert de fallback.
micronaut.router.static-resources.default.paths=classpath:public
micronaut.router.static-resources.default.mapping=/**

# ── Health ────────────────────────────────────────────────────────────────────
endpoints.health.enabled=true
endpoints.health.sensitive=false
endpoints.health.details-visible=ANONYMOUS
