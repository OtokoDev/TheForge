# Déploiement TheForge : application all-in-one (front + back) en conteneur, branchée
# sur le PostgreSQL qui tourne en SERVICE SYSTÈME sur l'hôte (base `theforge`, hors Docker).
# App exposée sur l'hôte :6000 → servie par Cloudflare et/ou le Caddy existant (host:6000).
# Agent APM Glowroot monté depuis /opt/glowroot (UI sur 127.0.0.1:4000).
#
#   cd /home/forge/theforge && docker compose pull && docker compose up -d
#   docker compose logs -f app
#
# Secrets/paramètres : fichier .env (voir deploy/env.example). Cf. deployment.md.

services:
  app:
    image: ${THEFORGE_IMAGE:-bryanguerin/theforge:latest}
    container_name: theforge-app
    # UID/GID du user hôte propriétaire des logs montés (id -u / id -g).
    user: "${PUID:-1000}:${PGID:-1000}"
    # Joindre le PostgreSQL système de l'hôte (host.docker.internal → passerelle hôte).
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      # Bloque le profil dev (localhost). Seules les variables ci-dessous font foi.
      MICRONAUT_ENVIRONMENTS: prod
      # PostgreSQL = service système de l'hôte. Identifiants = user/base créés sur l'hôte.
      DATASOURCES_DEFAULT_URL: jdbc:postgresql://host.docker.internal:5432/theforge
      DATASOURCES_DEFAULT_USERNAME: ${POSTGRES_USER:-theforge}
      DATASOURCES_DEFAULT_PASSWORD: ${POSTGRES_PASSWORD:?définissez POSTGRES_PASSWORD dans .env}
      # Secret JWT HS256 — OBLIGATOIRE, ≥ 32 caractères (openssl rand -base64 48).
      JWT_GENERATOR_SIGNATURE_SECRET: ${JWT_GENERATOR_SIGNATURE_SECRET:?définissez un secret fort dans .env}
      # OAuth2 Discord — OBLIGATOIRE (Discord Developer Portal).
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID:?définissez DISCORD_CLIENT_ID dans .env}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET:?définissez DISCORD_CLIENT_SECRET dans .env}
      # Discord ID promu SYSTEM à la 1re connexion (optionnel).
      FORGE_OWNER_DISCORD_ID: ${FORGE_OWNER_DISCORD_ID:-}
      # Webhooks Discord (optionnels, sinon désactivés).
      DISCORD_WEBHOOK_SHOP: ${DISCORD_WEBHOOK_SHOP:-}
      DISCORD_WEBHOOK_ORDERS: ${DISCORD_WEBHOOK_ORDERS:-}
      # Vide = front embarqué même origine (redirections relatives, pas de CORS).
      FRONT_ORIGIN: ${FRONT_ORIGIN:-}
      # Agent Glowroot (APM, jar monté depuis l'hôte) + dossier des logs fichier.
      JAVA_OPTS: -javaagent:/opt/glowroot/glowroot.jar -DLOG_DIR=/logs ${JAVA_OPTS:-}
    volumes:
      # Logs persistés sur l'hôte.
      - /opt/volumes/forge/log:/logs
      # Agent Glowroot (jar + données) — rw : glowroot y écrit. Dossier à chown au user forge.
      - /opt/glowroot:/opt/glowroot
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s
    ports:
      # App exposée (Cloudflare devant). Hôte 6000 → 8080 conteneur.
      - "6000:8080"
      # UI Glowroot (monitoring) — localhost seulement (tunnel SSH/Cloudflare pour y accéder).
      - "127.0.0.1:4000:4000"
    restart: unless-stopped
